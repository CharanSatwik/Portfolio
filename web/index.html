<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Portfolio">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=block" rel="stylesheet">

  <title>Charan's Portfolio</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <style>
    body {
      background-color: #F8F3EB;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      transition: opacity 0.5s ease-out;
    }

    /* SVG Spinner Container */
    .svg-spinner {
      width: 48px;
      height: 48px;
      animation: rotate 2s linear infinite;
    }

    /* Background track circle */
    .spinner-track {
      fill: none;
      stroke: rgba(26, 26, 26, 0.06);
      stroke-width: 2;
    }

    /* Animated arc */
    .spinner-arc {
      fill: none;
      stroke: #1A1A1A;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 60;
      animation: draw 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    .fun-fact {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      color: #1A1A1A;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      transition: opacity 0.4s ease;
    }

    @keyframes rotate {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes draw {
      0% {
        stroke-dasharray: 1, 150;
        stroke-dashoffset: 0;
      }

      50% {
        stroke-dasharray: 90, 150;
        stroke-dashoffset: -35;
      }

      100% {
        stroke-dasharray: 1, 150;
        stroke-dashoffset: -125;
      }
    }

    /* Force hide default Flutter loader */
    .flutter-loader,
    #loading,
    [flutter-loader],
    .flutter-loader-bar {
      display: none !important;
    }
  </style>

  <div id="loading-indicator" class="loader-container">
    <!-- Hidden element to "pre-warm" the font so it's ready for the app -->
    <div style="font-family: 'Space Grotesk'; position: absolute; opacity: 0; pointer-events: none;">.</div>
    <!-- Custom SVG Spinner -->
    <svg class="svg-spinner" viewBox="0 0 50 50">
      <circle class="spinner-track" cx="25" cy="25" r="20" />
      <circle class="spinner-arc" cx="25" cy="25" r="20" />
    </svg>
    <div id="fun-fact" class="fun-fact"></div>
  </div>

  <script>
    (function () {
      var facts = [
        "A group of flamingos is called a 'flamboyance'. Iconic.",
        "Bananas are berries, but strawberries aren't. Science is weird.",
        "Octopuses have three hearts. Two stop when they swim. Relatable.",
        "\"I don't wanna conquer anything. I just think the guy with the most freedom is the Pirate King.\" — Monkey D.Luffy",
        "Cows have best friends and get stressed when separated.",
        "A jiffy is an actual unit of time: 1/100th of a second.",
        "Sloths can hold their breath longer than dolphins. Flex.",
        "The average person walks past 36 murderers in their lifetime. Sleep well!",
        "Nintendo was founded in 1889. They sold playing cards.",
        "Honey never spoils. 3000-year-old Egyptian honey is still edible.",
        "You're mass-producing red blood cells right now. Multitasker.",
        "A cloud weighs about 1.1 million pounds. They're just vibing up there.",
        "Your skeleton is always wet. You're welcome for that thought.",
        "\"The world isn't perfect. But it's there for us, trying the best it can.\" — Roy Mustang",
        "The dot over the letter 'i' is called a tittle. Now you know."
      ];
      var shuffled = facts.sort(function () { return Math.random() - 0.5; });
      var index = 0;
      var el = document.getElementById('fun-fact');
      if (el) {
        el.textContent = shuffled[0];
        setInterval(function () {
          el.style.opacity = '0';
          setTimeout(function () {
            index = (index + 1) % shuffled.length;
            el.textContent = shuffled[index];
            el.style.opacity = '1';
          }, 400);
        }, 3000);
      }
    })();
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" defer></script>
</body>

</html>
